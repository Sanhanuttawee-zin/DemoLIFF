<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Brightside People | Executive Growth Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   BRIGHTSIDE PEOPLE — ORANGE × WHITE
   Executive Growth Portal
═══════════════════════════════════════ */
:root {
  /* Brand */
  --orange:      #E8622A;
  --orange-d:    #C94F1A;
  --orange-l:    #F47A44;
  --orange-xl:   #FFF0EB;
  --orange-2:    rgba(232,98,42,0.10);
  --orange-3:    rgba(232,98,42,0.06);

  /* Neutrals */
  --white:       #FFFFFF;
  --bg:          #F8F5F2;
  --bg2:         #F2EDE8;
  --surface:     #FFFFFF;
  --ink:         #1C1410;
  --ink2:        #3D2B1F;
  --text:        #2D1F16;
  --text2:       #7A6255;
  --text3:       #B8A898;
  --border:      #E8DDD5;
  --border2:     rgba(232,98,42,0.25);

  /* Accents */
  --gold:        #D4902A;
  --gold-l:      rgba(212,144,42,0.12);
  --sage:        #3DAB7A;
  --sage-l:      rgba(61,171,122,0.12);
  --sky:         #2E86C1;
  --sky-l:       rgba(46,134,193,0.1);
  --rose:        #C0392B;
  --rose-l:      rgba(192,57,43,0.1);

  /* UI */
  --shadow:      0 2px 20px rgba(28,20,16,0.08);
  --shadow-m:    0 6px 36px rgba(28,20,16,0.12);
  --shadow-o:    0 4px 24px rgba(232,98,42,0.20);
  --radius:      16px;
  --radius-sm:   10px;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
  font-family:'Prompt','Noto Sans Thai',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

.app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;background:var(--bg);}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;min-height:100vh;}
.screen.active{display:flex;animation:up .38s cubic-bezier(.22,1,.36,1);}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ── SHARED ── */
.pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 11px;border-radius:20px;
  font-size:11px;font-weight:700;letter-spacing:.3px;
}
.pill-orange{background:var(--orange-2);color:var(--orange);}
.pill-gold{background:var(--gold-l);color:var(--gold);}
.pill-sage{background:var(--sage-l);color:var(--sage);}
.pill-sky{background:var(--sky-l);color:var(--sky);}
.pill-rose{background:var(--rose-l);color:var(--rose);}

.card{
  background:var(--white);border:1.5px solid var(--border);
  border-radius:var(--radius);padding:18px;
  transition:all .22s;
}
.card:hover{border-color:var(--border2);box-shadow:var(--shadow);}

.sep{height:1px;background:var(--border);margin:0 16px;}

/* Bottom nav */
.bnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:rgba(255,255,255,0.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1.5px solid var(--border);
  display:flex;z-index:300;
  padding-bottom:env(safe-area-inset-bottom,10px);
}
.bnav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 0 5px;gap:3px;cursor:pointer;position:relative;transition:all .2s;
}
.bnav-icon{font-size:21px;transition:transform .25s cubic-bezier(.34,1.56,.64,1);}
.bnav-lbl{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.3px;transition:color .2s;}
.bnav-item.active .bnav-icon{transform:translateY(-2px) scale(1.05);}
.bnav-item.active .bnav-lbl{color:var(--orange);font-weight:700;}
.bnav-item.active::after{
  content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);
  width:24px;height:2.5px;background:var(--orange);border-radius:2px;
}
.bnav-pip{
  position:absolute;top:8px;right:calc(50% - 16px);
  width:7px;height:7px;background:var(--orange);border-radius:50%;
  border:2px solid var(--white);
}

.spacer{height:88px;}

/* Buttons */
.btn{
  width:100%;padding:15px;border:none;border-radius:12px;
  font-family:'Prompt',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .2s;letter-spacing:.2px;
}
.btn-orange{
  background:linear-gradient(135deg,var(--orange),var(--orange-l));
  color:#fff;
  box-shadow:var(--shadow-o);
}
.btn-orange:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(232,98,42,0.3);}
.btn-orange:active{transform:translateY(0);}
.btn-ghost{
  background:transparent;color:var(--text2);
  border:1.5px solid var(--border);
  margin-top:10px;
}
.btn-ghost:hover{border-color:var(--border2);color:var(--orange);}
.btn-line{
  background:#06C755;color:#fff;
  box-shadow:0 4px 20px rgba(6,199,85,.25);
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.btn-line:hover{background:#05b34c;transform:translateY(-2px);}

/* Scroll */
.scroll-x{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.scroll-x::-webkit-scrollbar{display:none;}

/* Toast */
.toast{
  position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--ink);color:var(--white);border-radius:10px;
  padding:11px 20px;font-size:13px;font-weight:600;
  z-index:999;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none;
  box-shadow:var(--shadow-m);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Float pts */
.float-pt{
  position:fixed;font-size:15px;font-weight:800;color:var(--orange);
  pointer-events:none;z-index:999;
  animation:fUp 1.4s ease-out forwards;
}
@keyframes fUp{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-56px);}}

/* Confetti */
.cfwrap{position:fixed;inset:0;pointer-events:none;z-index:998;overflow:hidden;}
.cf{position:absolute;border-radius:2px;animation:cfFall linear forwards;}
@keyframes cfFall{0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(110vh) rotate(540deg);opacity:0;}}

/* Overlay */
.overlay{
  position:fixed;inset:0;background:rgba(28,20,16,.65);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;z-index:900;padding:24px;
}
.overlay.show{display:flex;animation:up .35s ease;}
.ov-card{
  background:var(--white);border:1.5px solid var(--border);border-radius:22px;
  padding:34px 26px;width:100%;max-width:360px;text-align:center;
  box-shadow:var(--shadow-m);
  animation:pop .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pop{from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}

/* Section */
.sec{padding:20px 16px 0;}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-title{font-size:15px;font-weight:700;color:var(--text);}
.sec-link{font-size:12px;color:var(--orange);font-weight:700;cursor:pointer;}

/* Stagger */
.stagger>*{animation:up .4s cubic-bezier(.22,1,.36,1) both;}
.stagger>*:nth-child(1){animation-delay:.04s;}
.stagger>*:nth-child(2){animation-delay:.10s;}
.stagger>*:nth-child(3){animation-delay:.16s;}
.stagger>*:nth-child(4){animation-delay:.22s;}
.stagger>*:nth-child(5){animation-delay:.28s;}
.stagger>*:nth-child(6){animation-delay:.34s;}

/* ═══════════════════════
   1. WELCOME
═══════════════════════ */
#sc-welcome{
  background:var(--white);
  justify-content:center;align-items:center;
  padding:48px 28px;text-align:center;
}
.ws-logo-wrap{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:28px;
}
.ws-logo-img{
  width:180px;height:auto;object-fit:contain;
  /* Fallback if logo doesn't load */
}
.ws-logo-fallback{
  width:140px;height:56px;
  background:linear-gradient(135deg,var(--orange),var(--orange-l));
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  padding:8px 16px;
}
.ws-logo-text{font-size:15px;font-weight:800;color:#fff;letter-spacing:.5px;line-height:1.2;text-align:center;}

.ws-tagline{
  font-size:11px;font-weight:700;letter-spacing:2px;color:var(--orange);
  text-transform:uppercase;margin-bottom:12px;
}
.ws-headline{font-size:26px;font-weight:800;line-height:1.3;color:var(--ink);margin-bottom:8px;}
.ws-sub{font-size:14px;color:var(--text2);line-height:1.75;margin-bottom:28px;}

.ws-divider{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
.ws-line{flex:1;height:1px;background:var(--border);}
.ws-div-txt{font-size:11px;color:var(--text3);letter-spacing:.5px;white-space:nowrap;}

.ws-features{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px;text-align:left;}
.ws-feat{
  background:var(--bg);border:1.5px solid var(--border);border-radius:12px;
  padding:14px;display:flex;gap:10px;align-items:flex-start;
  transition:all .2s;
}
.ws-feat:hover{border-color:var(--border2);background:var(--orange-xl);}
.ws-fi{font-size:20px;flex-shrink:0;margin-top:1px;}
.ws-ft{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:2px;}
.ws-fs{font-size:11px;color:var(--text2);line-height:1.4;}

/* ═══════════════════════
   2. DASHBOARD
═══════════════════════ */
#sc-home{padding:0;}

.home-hero{
  background:linear-gradient(145deg,var(--orange-d) 0%,var(--orange) 50%,var(--orange-l) 100%);
  padding:48px 20px 24px;
  position:relative;overflow:hidden;
}
.home-hero::before{
  content:'';position:absolute;top:-60px;right:-60px;
  width:220px;height:220px;border-radius:50%;
  background:rgba(255,255,255,0.08);pointer-events:none;
}
.home-hero::after{
  content:'';position:absolute;bottom:-80px;left:-20px;
  width:180px;height:180px;border-radius:50%;
  background:rgba(255,255,255,0.05);pointer-events:none;
}

/* Hero topbar */
.hero-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;position:relative;z-index:1;}
.hero-logo{
  height:32px;width:auto;object-fit:contain;
  filter:brightness(0) invert(1);/* make logo white */
}
.hero-logo-fallback{
  font-size:14px;font-weight:800;color:#fff;letter-spacing:.5px;
  display:flex;align-items:center;gap:6px;
}
.hero-logo-dot{
  width:26px;height:26px;background:rgba(255,255,255,.25);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:14px;
}
.hero-notif{
  width:36px;height:36px;background:rgba(255,255,255,.2);
  border-radius:10px;border:1px solid rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;
  position:relative;transition:all .2s;
}
.hero-notif:hover{background:rgba(255,255,255,.3);}
.hero-notif-dot{
  position:absolute;top:7px;right:7px;
  width:7px;height:7px;background:#FFE87C;border-radius:50%;
  border:1.5px solid var(--orange);
}

.hero-greet{font-size:12px;color:rgba(255,255,255,.75);margin-bottom:3px;font-weight:400;position:relative;z-index:1;}
.hero-name{font-size:20px;font-weight:800;color:#fff;margin-bottom:18px;position:relative;z-index:1;}

/* Score Card */
.score-card{
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  border-radius:14px;padding:16px 18px;backdrop-filter:blur(8px);
  display:flex;align-items:center;gap:16px;position:relative;z-index:1;
}
.score-ring{flex-shrink:0;}
.score-ring svg{display:block;}
.ring-track{fill:none;stroke:rgba(255,255,255,.2);stroke-width:6;}
.ring-fill{fill:none;stroke:#FFE87C;stroke-width:6;stroke-linecap:round;
  transform:rotate(-90deg);transform-origin:50% 50%;
  transition:stroke-dashoffset 1.5s cubic-bezier(.22,1,.36,1);}
.ring-num{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;
}
.ring-pct{font-size:16px;font-weight:800;color:#fff;line-height:1;}
.ring-unit{font-size:9px;color:rgba(255,255,255,.7);font-weight:700;}

.score-body{flex:1;}
.score-lbl{font-size:10px;font-weight:700;color:rgba(255,255,255,.75);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.score-val{font-size:30px;font-weight:800;color:#fff;line-height:1;}
.score-sub{font-size:12px;color:rgba(255,255,255,.7);margin-top:3px;}
.score-prog{display:flex;align-items:center;gap:8px;margin-top:10px;}
.score-bar{flex:1;height:4px;background:rgba(255,255,255,.2);border-radius:2px;overflow:hidden;}
.score-fill{height:100%;background:#FFE87C;border-radius:2px;transition:width 1.5s cubic-bezier(.22,1,.36,1);}
.score-nxt{font-size:11px;color:rgba(255,255,255,.65);}

/* Quick stats */
.qs-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 14px 0;}
.qs{
  background:var(--white);border:1.5px solid var(--border);border-radius:13px;
  padding:12px 6px;text-align:center;cursor:pointer;transition:all .2s;
}
.qs:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--shadow);}
.qs-icon{font-size:19px;margin-bottom:4px;}
.qs-val{font-size:17px;font-weight:800;color:var(--orange);}
.qs-lbl{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.3px;text-transform:uppercase;margin-top:2px;}

/* Alert */
.alert-band{
  margin:14px 14px 0;
  background:var(--orange-xl);border:1.5px solid var(--border2);border-radius:13px;
  padding:13px 14px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:all .2s;
}
.alert-band:hover{transform:translateX(4px);}
.alert-pulse{width:8px;height:8px;background:var(--orange);border-radius:50%;flex-shrink:0;animation:blink 1.8s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.alert-body{flex:1;}
.alert-title{font-size:13px;font-weight:700;color:var(--orange);}
.alert-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.alert-chev{font-size:18px;color:var(--text3);}

/* Program card */
.prog-card{
  background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:10px;cursor:pointer;transition:all .25s;
  position:relative;overflow:hidden;
}
.prog-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:2px 0 0 2px;
  background:linear-gradient(180deg,var(--orange),var(--orange-l));
}
.prog-card.done::before{background:linear-gradient(180deg,var(--sage),#52c490);}
.prog-card.sky::before{background:linear-gradient(180deg,var(--sky),#5BA4D0);}
.prog-card:hover{border-color:var(--border2);transform:translateX(4px);box-shadow:var(--shadow);}
.pc-type{font-size:10px;font-weight:700;color:var(--orange);letter-spacing:.8px;text-transform:uppercase;}
.pc-name{font-size:14px;font-weight:700;color:var(--ink);margin:4px 0 3px;}
.pc-date{font-size:11px;color:var(--text2);}
.pc-bar{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-top:11px;}
.pc-fill{height:100%;border-radius:2px;transition:width 1.2s ease;}
.pc-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:7px;}
.pc-meta{font-size:11px;color:var(--text3);}
.pc-pts{font-size:13px;font-weight:800;color:var(--orange);}

/* Insights */
.insight-item{
  background:var(--white);border:1.5px solid var(--border);border-radius:13px;
  padding:13px 15px;margin-bottom:8px;display:flex;align-items:center;gap:13px;transition:all .2s;
}
.insight-item:hover{border-color:var(--border2);}
.ii-icon{
  width:40px;height:40px;border-radius:10px;background:var(--orange-xl);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
}
.ii-body{flex:1;}
.ii-title{font-size:13px;font-weight:700;margin-bottom:2px;}
.ii-sub{font-size:11px;color:var(--text2);}
.ii-score{font-size:22px;font-weight:800;color:var(--orange);}

/* Streak */
.streak-row{display:flex;gap:6px;}
.sd{
  flex:1;aspect-ratio:1;border-radius:9px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--bg2);border:1.5px solid var(--border);gap:2px;transition:all .2s;
}
.sd.done{background:var(--orange-xl);border-color:var(--border2);}
.sd.today{border-color:var(--orange);box-shadow:0 0 0 2px rgba(232,98,42,.15);}
.sd-e{font-size:13px;}
.sd-d{font-size:9px;color:var(--text3);font-weight:700;}

/* ═══════════════════════
   3. COMMIT (ส่งงาน)
═══════════════════════ */
#sc-commit{padding:0;background:var(--bg);}

.commit-head{
  background:linear-gradient(145deg,var(--orange-d),var(--orange));
  padding:48px 20px 24px;
}
.ch-back{
  display:flex;align-items:center;gap:6px;margin-bottom:20px;cursor:pointer;
  font-size:12px;font-weight:600;color:rgba(255,255,255,.75);transition:color .2s;width:fit-content;
}
.ch-back:hover{color:#fff;}
.ch-title{font-size:20px;font-weight:800;color:#fff;margin:8px 0 5px;line-height:1.3;}
.ch-sub{font-size:13px;color:rgba(255,255,255,.75);line-height:1.6;}
.ch-due{
  display:inline-flex;align-items:center;gap:6px;margin-top:12px;
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  border-radius:8px;padding:5px 12px;
  font-size:12px;font-weight:700;color:#fff;
}

.commit-body{padding:20px 16px 0;flex:1;}

/* XP Preview */
.xp-bar-card{
  background:var(--white);border:1.5px solid var(--border2);border-radius:14px;
  padding:14px 18px;margin-bottom:20px;
  display:flex;align-items:center;justify-content:space-between;
}
.xp-lbl{font-size:12px;color:var(--text2);font-weight:600;}
.xp-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.xp-val{font-size:30px;font-weight:800;color:var(--orange);}
.xp-unit{font-size:12px;color:var(--text2);}

/* Form */
.fgrp{margin-bottom:22px;}
.flbl{
  font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
  color:var(--text2);margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;
}
.f-badge{
  background:var(--orange-2);color:var(--orange);border:1px solid var(--border2);
  padding:2px 9px;border-radius:5px;font-size:10px;font-weight:800;
}

/* Checklist */
.ci{
  background:var(--white);border:1.5px solid var(--border);border-radius:11px;
  padding:13px 14px;margin-bottom:7px;
  display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;
}
.ci:hover{border-color:var(--border2);}
.ci.checked{background:var(--sage-l);border-color:rgba(61,171,122,.3);}
.ci-box{
  width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border);
  background:var(--bg);display:flex;align-items:center;justify-content:center;
  font-size:11px;flex-shrink:0;transition:all .2s;
}
.ci.checked .ci-box{background:var(--sage);border-color:var(--sage);color:#fff;}
.ci-txt{flex:1;font-size:13px;font-weight:500;line-height:1.4;color:var(--text);}
.ci-pts{font-size:11px;font-weight:800;color:var(--gold);flex-shrink:0;}

/* Mood */
.mood-row{display:flex;gap:7px;}
.mb{
  flex:1;background:var(--white);border:1.5px solid var(--border);border-radius:11px;
  padding:10px 4px;text-align:center;cursor:pointer;
  transition:all .25s cubic-bezier(.34,1.56,.64,1);
}
.mb .me{font-size:22px;display:block;margin-bottom:3px;}
.mb .mn{font-size:10px;color:var(--text3);font-weight:700;}
.mb.sel{border-color:var(--orange);background:var(--orange-xl);}
.mb.sel .mn{color:var(--orange);}

/* Stars */
.star-row{display:flex;justify-content:center;gap:12px;padding:6px 0;}
.sb{
  font-size:34px;cursor:pointer;color:#E0D4CC;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
}
.sb.on{color:var(--orange);transform:scale(1.2);}

/* Textarea */
.ftextarea{
  width:100%;padding:14px 15px;
  background:var(--white);border:1.5px solid var(--border);border-radius:11px;
  color:var(--text);font-family:'Prompt',sans-serif;font-size:13px;
  resize:none;min-height:96px;outline:none;transition:border-color .2s;line-height:1.6;
}
.ftextarea:focus{border-color:var(--orange);}
.ftextarea::placeholder{color:var(--text3);}

/* Upload */
.upload-zone{
  border:2px dashed var(--border);border-radius:12px;padding:26px;
  text-align:center;cursor:pointer;transition:all .2s;background:var(--white);
}
.upload-zone:hover,.upload-zone.has-file{border-color:var(--orange);background:var(--orange-xl);}
.uz-icon{font-size:30px;margin-bottom:6px;}
.uz-title{font-size:13px;font-weight:600;color:var(--text2);}
