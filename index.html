<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Brightside People | Executive Growth Portal</title>
<link rel="stylesheet" href="css/main.css">
<style>
#sc-welcome {
  background:var(--white);
  justify-content:center; align-items:center;
  padding:52px 28px 40px; text-align:center;
}
.ws-logo      { width:160px; height:auto; }
.ws-logo-fb   { display:none; background:linear-gradient(135deg,var(--orange),#F47A44); border-radius:10px; padding:8px 18px; font-size:15px; font-weight:800; color:#fff; }
.ws-tagline   { font-size:11px; font-weight:700; letter-spacing:2px; color:var(--orange); text-transform:uppercase; margin-bottom:10px; }
.ws-headline  { font-size:26px; font-weight:800; line-height:1.3; color:var(--ink); margin-bottom:8px; }
.ws-bar       { width:36px; height:3px; background:var(--orange); border-radius:2px; margin:12px auto 16px; }
.ws-sub       { font-size:14px; color:var(--text2); line-height:1.75; margin-bottom:28px; }
.ws-divider   { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
.ws-line      { flex:1; height:1px; background:var(--border); }
.ws-div-txt   { font-size:11px; color:var(--text3); letter-spacing:.5px; white-space:nowrap; }
.ws-features  { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:28px; text-align:left; }
.ws-feat      { background:var(--bg); border:1.5px solid var(--border); border-radius:12px; padding:13px; display:flex; gap:10px; align-items:flex-start; transition:all .2s; }
.ws-feat:hover{ border-color:var(--border2); background:var(--orange-xl); }
.ws-fi { font-size:20px; flex-shrink:0; margin-top:1px; }
.ws-ft { font-size:13px; font-weight:700; color:var(--ink); margin-bottom:2px; }
.ws-fs { font-size:11px; color:var(--text2); line-height:1.4; }
</style>
</head>
<body>
<div id="sc-welcome" class="page-wrap stagger">

  <div style="margin-bottom:28px;">
    <img src="https://brightsidepeople.com/wp-content/uploads/BSide-Logo.png"
         alt="Brightside People" class="ws-logo"
         onerror="this.style.display='none';document.getElementById('logo-fb').style.display='flex';">
    <div id="logo-fb" class="ws-logo-fb">Brightside People</div>
  </div>

  <div class="ws-tagline">Executive Growth Portal</div>
  <div class="ws-headline">พัฒนาองค์กร<br>ให้ยั่งยืน</div>
  <div class="ws-bar"></div>
  <div class="ws-sub">ติดตามพัฒนาการผู้บริหาร หลัง Workshop<br>สะสม Leadership Points · วัดผลจริง</div>

  <div class="ws-features">
    <div class="ws-feat"><div class="ws-fi">📋</div><div><div class="ws-ft">ส่ง Commitment</div><div class="ws-fs">Action plan หลัง Workshop</div></div></div>
    <div class="ws-feat"><div class="ws-fi">📊</div><div><div class="ws-ft">ติดตาม KPI</div><div class="ws-fs">วัดผลเป็น Dashboard</div></div></div>
    <div class="ws-feat"><div class="ws-fi">⭐</div><div><div class="ws-ft">สะสม Points</div><div class="ws-fs">Leadership Score</div></div></div>
    <div class="ws-feat"><div class="ws-fi">🏆</div><div><div class="ws-ft">รับรางวัล</div><div class="ws-fs">Badges & Privileges</div></div></div>
  </div>

  <div class="ws-divider">
    <div class="ws-line"></div>
    <div class="ws-div-txt">เชื่อมต่อผ่าน LINE</div>
    <div class="ws-line"></div>
  </div>

  <button class="btn btn-line" onclick="doLogin()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
    เข้าสู่ระบบด้วย LINE
  </button>
  <button class="btn btn-ghost" onclick="doLogin()">ทดลองใช้งาน (Demo)</button>

</div>
<div id="toast"></div>
<script src="js/state.js"></script>
<script src="js/effects.js"></script>
<script>
function doLogin() {
  showToast('🟢 เชื่อมต่อ LINE สำเร็จ!');
  setTimeout(() => { location.href = 'pages/home.html'; }, 900);
}
</script>
</body>
</html>
